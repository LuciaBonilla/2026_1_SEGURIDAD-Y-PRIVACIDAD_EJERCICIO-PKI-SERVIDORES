worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 443 ssl;
        server_name LUCIA-BONILLA;

        # --- Certificado de servidor (firmado por la CA SeguridadYPrivacidad) ---
        ssl_certificate     /etc/nginx/ssl/server/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server/server.key;

        # --- Verificación del certificado de cliente (mTLS) ---
        ssl_client_certificate /etc/nginx/ssl/ca/SeguridadYPrivacidadCA.cer;
        ssl_verify_client      optional;
        ssl_verify_depth       2;

        # --- Endurecimiento TLS ---
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # --- Lista de permitidos por DN ---
        set $client_dn "";
        if ($ssl_client_s_dn ~* "CN=lucia.bonilla@correo.ucu.edu.uy") {
            set $client_dn "authorized";
        }

        location / {
            if ($ssl_client_verify != "SUCCESS") {
                return 400;
            }
            if ($client_dn != "authorized") {
                return 403;
            }
            root   /usr/share/nginx/html;
            index  index.html;
        }
    }
}
